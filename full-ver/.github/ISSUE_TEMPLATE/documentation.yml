---
name: Documentation
description: ドキュメントの追加・更新
title: "[Doc] "
labels: ["type:doc"]
body:
  - type: markdown
    attributes:
      value: |
        ## Documentation
        ドキュメント改善のリクエストありがとうございます！
        不明な項目は「Unknown」や「未定」と記入してOKです。

  # === 必須項目（最小限） ===

  - type: textarea
    id: user-value
    attributes:
      label: ユーザー価値（User Value）
      description: このドキュメントで誰がどう嬉しくなりますか？
      placeholder: |
        - 新規開発者: オンボーディングが楽になる
        - ユーザー: 機能の使い方が分かりやすくなる
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 課題/背景（Problem）
      description: ドキュメントの何が問題ですか？
      placeholder: |
        - 〇〇の説明がない
        - △△の手順が古い / 間違っている
        - □□が分かりにくい
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 提案/解決策（Solution）
      description: どのようなドキュメント変更を想定していますか？
      placeholder: |
        - 〇〇のセクションを追加する
        - △△の手順を更新する
        - README に□□を記載する
    validations:
      required: true

  # === 影響範囲 ===

  - type: checkboxes
    id: doc-type
    attributes:
      label: ドキュメント種別（Document Type）
      description: どのドキュメントに関係しますか？
      options:
        - label: "README"
        - label: "API ドキュメント"
        - label: "開発ガイド"
        - label: "アーキテクチャドキュメント（ADR等）"
        - label: "ユーザーガイド / ヘルプ"
        - label: "コメント / コード内ドキュメント"
        - label: "その他"

  - type: checkboxes
    id: devcontainer-hint
    attributes:
      label: 🐳 DevContainer 要否
      description: ドキュメント変更のみの場合、通常 DevContainer は不要です。チェックなし = DevContainer 不要として扱います。
      options:
        - label: "DevContainer 必要（ドキュメント以外の変更も含む場合）"

  # === 完了条件 ===

  - type: textarea
    id: definition-of-done
    attributes:
      label: 完了条件（Definition of Done）
      description: "何ができたら完了か？"
      placeholder: |
        - [ ] 〇〇セクションが追加されている
        - [ ] レビューを受けている
      value: |
        - [ ]
        - [ ]
    validations:
      required: true

  # === 任意項目 ===

  - type: dropdown
    id: role
    attributes:
      label: 主担当職種（Role）
      description: 主に誰が対応するか（Issue 作成後に対応するラベル role:* を付与してください。詳細は .github/labels.yml 参照）
      options:
        - "role:frontend — フロントエンド"
        - "role:backend — バックエンド"
        - "role:designer — デザイナー"
        - "role:infra — インフラ"
        - "role:ops — オペレーション"
      default: 0
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: 優先度（Priority）
      description: 緊急度・重要度の目安（Issue 作成後に対応するラベル priority:* を付与してください。詳細は .github/labels.yml 参照）
      options:
        - "priority:must — 必須（ブロッカー）"
        - "priority:nice — Nice to Have"
        - "priority:medium — 中優先度"
        - "priority:low — 低優先度"
      default: 0
    validations:
      required: false

  - type: textarea
    id: target-audience
    attributes:
      label: 対象読者（Target Audience）
      description: このドキュメントの想定読者
      placeholder: "新規開発者 / エンドユーザー / 運用担当者"
    validations:
      required: false

  - type: textarea
    id: risks-unknowns
    attributes:
      label: リスク/未確認事項（Risks/Unknowns）
      description: 不確実な点、確認が必要な点
      placeholder: "〇〇の詳細が不明 / △△の仕様を確認中"
    validations:
      required: false

  - type: textarea
    id: references
    attributes:
      label: 参考（References）
      description: 関連リンク、既存ドキュメント、関連 Issue など
      placeholder: |
        - 現在のドキュメント: docs/xxx.md
        - 関連 Issue: #123
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: 確認事項
      options:
        - label: 既存の Issue を検索し、重複がないことを確認しました
          required: true
