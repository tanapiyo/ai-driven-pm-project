---
name: Epic
description: 複数の関連 Issue を束ねる大規模機能
title: "[Epic] "
labels: ["type:epic"]
body:
  - type: markdown
    attributes:
      value: |
        ## Epic
        複数の Issue を束ねる大規模機能の Epic を作成します。
        不明な項目は「Unknown」や「未定」と記入してOKです。

  # === 必須項目 ===

  - type: textarea
    id: purpose
    attributes:
      label: Epic の目的（Purpose/Goal）
      description: この Epic で達成したい大きな目標・ビジョンを記載してください
      placeholder: "〇〇ができるようになることで、△△の体験を向上させる"
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: スコープ（Scope）
      description: この Epic に含まれる範囲を記載してください
      placeholder: |
        - 〇〇画面の実装
        - △△ API の追加
        - □□のテスト
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: 背景（Background）
      description: なぜこの Epic が必要か、課題や動機を記載してください
      placeholder: "現状は〇〇ができないため、△△の問題がある"
    validations:
      required: true

  - type: textarea
    id: child-issues
    attributes:
      label: Child Issues
      description: この Epic に含まれる子 Issue の一覧（作成後に更新可）
      placeholder: |
        | # | Title | Status | Assignee |
        |---|-------|--------|----------|
        | #xxx | [Feature] ... | 🔴 Open | - |
        | #xxx | [Task] ... | 🔴 Open | - |
      value: |
        | # | Title | Status | Assignee |
        |---|-------|--------|----------|
        | TBD | [Type] ... | 🔴 Open | - |
        | TBD | [Type] ... | 🔴 Open | - |
    validations:
      required: true

  - type: textarea
    id: definition-of-done
    attributes:
      label: 完了条件（Definition of Done）
      description: "何ができたら完了か？チェックリスト形式推奨"
      placeholder: |
        - [ ] すべての Child Issues が完了している
        - [ ] 〇〇が利用可能になっている
        - [ ] ドキュメントが更新されている
      value: |
        - [ ] すべての Child Issues が完了している
        - [ ]
        - [ ]
    validations:
      required: true

  # === 任意項目 ===

  - type: checkboxes
    id: impact-points
    attributes:
      label: 影響範囲（Impact Points）
      description: 影響がありそうな領域をチェック（不明な場合は空でOK）
      options:
        - label: "UI / フロントエンド"
        - label: "API / バックエンド"
        - label: "認証 / 認可（Auth）"
        - label: "データベース / データ構造"
        - label: "CI / ビルド / インフラ"
        - label: "テスト"
        - label: "ドキュメント"
        - label: "不明（Unknown）"

  - type: checkboxes
    id: devcontainer-hint
    attributes:
      label: 🐳 DevContainer 要否
      description: このタスクで Docker 開発環境（DB/API/Web）が必要かを判定します。チェックなし = 自動判定（Impact Points から推定）
      options:
        - label: "DevContainer 不要（ドキュメント/設定ファイルのみの変更）"

  - type: textarea
    id: risks-unknowns
    attributes:
      label: リスク/未確認事項（Risks/Unknowns）
      description: Epic 全体に関わるリスクや不確実な点
      placeholder: "〇〇の仕様が未確定 / △△の影響が不明"
    validations:
      required: false

  - type: textarea
    id: references
    attributes:
      label: 参考（References）
      description: 関連するドキュメント、Figma、関連 Issue など
      placeholder: |
        - Product Requirement: `docs/01_product/requirements/xxx.md`
        - Figma: https://...
        - 関連 Issue: #123
    validations:
      required: false

  - type: dropdown
    id: role
    attributes:
      label: 主担当職種（Role）
      description: 主に誰が対応するか（Issue 作成後に対応するラベル role:* を付与してください。詳細は .github/labels.yml 参照）
      options:
        - "role:frontend — フロントエンド"
        - "role:backend — バックエンド"
        - "role:designer — デザイナー"
        - "role:infra — インフラ"
        - "role:ops — オペレーション"
      default: 0
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: 優先度（Priority）
      description: 緊急度・重要度の目安（Issue 作成後に対応するラベル priority:* を付与してください。詳細は .github/labels.yml 参照）
      options:
        - "priority:must — 必須（ブロッカー）"
        - "priority:nice — Nice to Have"
        - "priority:medium — 中優先度"
        - "priority:low — 低優先度"
      default: 0
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: 確認事項
      options:
        - label: 既存の Issue を検索し、重複がないことを確認しました
          required: true
