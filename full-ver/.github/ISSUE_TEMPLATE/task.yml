---
name: Task
description: 技術的タスク・改善・リファクタリング（type:architect / type:improvement / type:chore）
title: ""
labels: []
body:
  - type: markdown
    attributes:
      value: |
        ## Task
        技術的タスクの起票ありがとうございます！
        不明な項目は「Unknown」や「未定」と記入してOKです。

  # === 必須項目（最小限） ===

  - type: textarea
    id: user-value
    attributes:
      label: ユーザー価値 / ビジネス価値（Value）
      description: このタスクで誰がどう嬉しくなりますか？（開発者体験の改善もOK）
      placeholder: |
        - 開発者: ビルド時間が短縮され、開発効率が上がる
        - ユーザー: ページ読み込みが速くなる
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 課題/背景（Problem）
      description: なぜこのタスクが必要ですか？
      placeholder: "現状は〇〇が遅い / 〇〇のコードが複雑で保守しづらい"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 提案/解決策（Solution）
      description: どのような変更・対応を想定していますか？
      placeholder: "〇〇をリファクタリングする / △△のキャッシュを導入する"
    validations:
      required: true

  # === 影響範囲 ===

  - type: checkboxes
    id: impact-points
    attributes:
      label: 影響範囲（Impact Points）
      description: 影響がありそうな領域をチェック（不明な場合は空でOK）
      options:
        - label: "UI / フロントエンド"
        - label: "API / バックエンド"
        - label: "認証 / 認可（Auth）"
        - label: "データベース / データ構造"
        - label: "CI / ビルド / インフラ"
        - label: "テスト"
        - label: "ドキュメント"
        - label: "不明（Unknown）"

  - type: checkboxes
    id: devcontainer-hint
    attributes:
      label: 🐳 DevContainer 要否
      description: このタスクで Docker 開発環境（DB/API/Web）が必要かを判定します。チェックなし = 自動判定（Impact Points から推定）
      options:
        - label: "DevContainer 不要（ドキュメント/設定ファイルのみの変更）"

  # === フロント実装観点（UI変更がある場合） ===

  - type: dropdown
    id: screen-id
    attributes:
      label: 画面ID（Screen ID）
      description: |
        UI変更がある場合、対象画面を選択（docs/01_product/screens/ 参照）
        複数画面にまたがる場合は「複数」を選び、完了条件に画面IDを列挙
      options:
        - "なし（UI変更なし）"
        - "L01 - ログイン"
        - "H01 - ホーム"
        - "S01 - 検索ホーム"
        - "AD01 - ユーザー/ロール管理"
        - "複数（Multiple）"
      default: 0
    validations:
      required: false

  - type: textarea
    id: acceptance-criteria-gwt
    attributes:
      label: 受入基準 — Given/When/Then（Acceptance Criteria）
      description: |
        各ACをGiven/When/Then形式で記載してください。
        フロント変更がある場合は必須です。
      placeholder: |
        **AC-001: タイトル**
        - Given: 前提条件
        - When: 操作
        - Then: 期待結果

        **AC-002: タイトル**
        - Given: 前提条件
        - When: 操作
        - Then: 期待結果
    validations:
      required: false

  - type: checkboxes
    id: ui-state-perspectives
    attributes:
      label: UI状態観点（UI State Perspectives）
      description: |
        UI変更がある場合、以下の状態を検討済みか確認してください。
        該当しない項目はチェック不要です。
      options:
        - label: "Loading（データ取得中の表示）"
        - label: "Empty（データなし時の表示）"
        - label: "Error（エラー発生時の表示）"
        - label: "Permission Denied（権限不足時の表示）"
        - label: "Responsive（モバイル/タブレット対応）"

  # === 完了条件 ===

  - type: textarea
    id: definition-of-done
    attributes:
      label: 完了条件（Definition of Done）
      description: "何ができたら完了か？チェックリスト形式推奨"
      placeholder: |
        - [ ] 〇〇がリファクタリングされている
        - [ ] テストが通る
        - [ ] パフォーマンスが改善されている（計測値）
      value: |
        - [ ]
        - [ ]
        - [ ]
    validations:
      required: true

  # === 任意項目 ===

  - type: dropdown
    id: role
    attributes:
      label: 主担当職種（Role）
      description: 主に誰が対応するか（Issue 作成後に対応するラベル role:* を付与してください。詳細は .github/labels.yml 参照）
      options:
        - "role:frontend — フロントエンド"
        - "role:backend — バックエンド"
        - "role:designer — デザイナー"
        - "role:infra — インフラ"
        - "role:ops — オペレーション"
      default: 0
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: 優先度（Priority）
      description: 緊急度・重要度の目安（Issue 作成後に対応するラベル priority:* を付与してください。詳細は .github/labels.yml 参照）
      options:
        - "priority:must — 必須（ブロッカー）"
        - "priority:nice — Nice to Have"
        - "priority:medium — 中優先度"
        - "priority:low — 低優先度"
      default: 0
    validations:
      required: false

  - type: dropdown
    id: task-subtype
    attributes:
      label: タスク種別（Task Subtype）
      description: |
        対応するラベルを選択してください。選択後、Issue 作成者または担当者が対応するラベル（type:architect / type:improvement / type:chore）を手動で付与してください。
        詳細は `.github/labels.yml` を参照。
      options:
        - "type:architect — アーキテクチャ・構造変更"
        - "type:improvement — 既存機能の改善"
        - "type:chore — 雑用・メンテナンス・依存更新"
      default: 0
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 検討した代替案（Alternatives）
      description: 他に検討した方法があれば
      placeholder: "〇〇も考えたが、△△の理由で不採用"
    validations:
      required: false

  - type: textarea
    id: issue-plan
    attributes:
      label: 分割案（Issue Plan）
      description: 大きい場合は分割案を記載（下書きOK、後で分割）
      placeholder: |
        - [ ] Issue 1: 〇〇の修正
        - [ ] Issue 2: △△のテスト追加
        - [ ] Issue 3: ドキュメント更新
    validations:
      required: false

  - type: textarea
    id: risks-unknowns
    attributes:
      label: リスク/未確認事項（Risks/Unknowns）
      description: 不確実な点、確認が必要な点
      placeholder: "〇〇への影響が不明 / △△の互換性が未検証"
    validations:
      required: false

  - type: textarea
    id: non-goals
    attributes:
      label: 非対象（Non-goals）
      description: この Issue では対応しない範囲（スコープ明確化）
      placeholder: "〇〇は今回対象外 / △△は別 Issue で対応"
    validations:
      required: false

  - type: textarea
    id: references
    attributes:
      label: 参考（References）
      description: 関連リンク、ベンチマーク結果、関連 Issue など
      placeholder: |
        - 関連 Issue: #123
        - 参考記事: https://...
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: 確認事項
      options:
        - label: 既存の Issue を検索し、重複がないことを確認しました
          required: true
