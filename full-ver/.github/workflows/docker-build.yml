name: Docker Build

on:
  pull_request:
  push:
    branches: ["main"]

# Minimum permissions for security
permissions:
  contents: read

jobs:
  # ============================================================
  # DOCKER BUILD VERIFICATION
  # Build production images for web and api services.
  # Outputs image tags. Does NOT push to registry (push is a separate later step).
  # ============================================================
  docker-build-api:
    name: Docker Build (api)
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tag
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          TAG="api:${SHORT_SHA}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Image tag: ${TAG}"

      - name: Build api Docker image
        uses: docker/build-push-action@v6
        with:
          context: projects
          file: projects/apps/api/Dockerfile
          push: false
          tags: ${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Output image tag
        run: |
          echo "Built image tag: ${{ steps.meta.outputs.tag }}"

  docker-build-web:
    name: Docker Build (web)
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tag
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          TAG="web:${SHORT_SHA}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Image tag: ${TAG}"

      - name: Build web Docker image
        uses: docker/build-push-action@v6
        with:
          context: projects
          file: projects/apps/web/Dockerfile
          push: false
          tags: ${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Output image tag
        run: |
          echo "Built image tag: ${{ steps.meta.outputs.tag }}"

  docker-build-summary:
    name: Docker Build Summary
    runs-on: ubuntu-latest
    needs: [docker-build-api, docker-build-web]
    steps:
      - name: Output all image tags
        run: |
          echo "=== Docker Build Summary ==="
          echo "api image tag : ${{ needs.docker-build-api.outputs.image-tag }}"
          echo "web image tag : ${{ needs.docker-build-web.outputs.image-tag }}"
          echo "=========================="
