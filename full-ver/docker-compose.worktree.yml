services:
  db:
    image: mysql:8.4
    container_name: ${CONTAINER_NAME}-db
    # ⚠️ DEVELOPMENT ONLY - Isolated DevContainer credentials
    # These credentials are network-isolated and not exposed to host
    environment:
      - MYSQL_USER=mysql
      - MYSQL_PASSWORD=mysql
      - MYSQL_DATABASE=app
      - MYSQL_ROOT_PASSWORD=rootpass
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - internal
    labels:
      - "worktree.endpoint=${ENDPOINT_NAME}"
      - "worktree.project=${COMPOSE_PROJECT_NAME}"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "mysql", "-pmysql"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  dev:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile.dev
    container_name: ${CONTAINER_NAME}-dev
    labels:
      - "worktree.endpoint=${ENDPOINT_NAME}"
      - "worktree.project=${COMPOSE_PROJECT_NAME}"
    volumes:
      - .:/workspace:cached
      - pnpm-store:/home/node/.local/share/pnpm
      # Mount main .git directory for worktree git support inside container.
      # For worktrees: MAIN_GIT_DIR points to the main repo's .git directory.
      # For non-worktrees: falls back to ./.git (redundant but harmless).
      - ${MAIN_GIT_DIR:-./.git}:/workspace/.git-main:cached
    working_dir: /workspace/projects
    tty: true
    stdin_open: true
    networks:
      - internal
    env_file:
      - path: .devcontainer/.env.devcontainer
        required: false
      # Git worktree env vars (GIT_DIR, GIT_WORK_TREE) — generated by init-environment.sh.
      # Only exists for worktrees; non-worktrees use normal git discovery.
      - path: .devcontainer/.env.git-worktree
        required: false
    environment:
      - DATABASE_URL=mysql://mysql:mysql@db:3306/app
    command: sh -c "pnpm install && touch /workspace/.dev-ready && sleep infinity"
    healthcheck:
      test: ["CMD", "test", "-f", "/workspace/.dev-ready"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 120s
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile.dev
    container_name: ${CONTAINER_NAME}-web
    volumes:
      - .:/workspace:cached
      - pnpm-store:/home/node/.local/share/pnpm
    working_dir: /workspace/projects/apps/web
    command: sh -c "pnpm next dev --hostname 0.0.0.0 --port 3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=/api
      - INTERNAL_API_URL=http://api:8080
    networks:
      internal:
        ipv4_address: ${WEB_STATIC_IP:-172.31.0.10}
      traefik-public: {}
    labels:
      - "traefik.enable=true"
      - "worktree.endpoint=${ENDPOINT_NAME}"
      - "worktree.project=${COMPOSE_PROJECT_NAME}"
      # Frontend router (low priority, catches all non-/api requests)
      - "traefik.http.routers.${WORKTREE}-fe.rule=Host(`${ENDPOINT_NAME}.localhost`)"
      - "traefik.http.routers.${WORKTREE}-fe.entrypoints=web"
      - "traefik.http.routers.${WORKTREE}-fe.priority=1"
      - "traefik.http.services.${WORKTREE}-fe.loadbalancer.server.port=3000"
    depends_on:
      dev:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  api:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile.dev
    container_name: ${CONTAINER_NAME}-api
    volumes:
      - .:/workspace:cached
      - pnpm-store:/home/node/.local/share/pnpm
    working_dir: /workspace/projects
    command: >-
      sh -c "
        pnpm --filter @monorepo/shared build &&
        pnpm --filter @monorepo/api db:generate &&
        pnpm --filter @monorepo/api db:push &&
        SCHEMA_HASH=$$(md5sum /workspace/projects/apps/api/prisma/schema.prisma | cut -d' ' -f1) &&
        if [ ! -f \"/workspace/.db-seeded-$${SCHEMA_HASH}\" ]; then
          rm -f /workspace/.db-seeded-* &&
          pnpm --filter @monorepo/api db:seed &&
          touch \"/workspace/.db-seeded-$${SCHEMA_HASH}\";
        else
          echo 'Seed data up-to-date, skipping';
        fi &&
        pnpm --filter @monorepo/api dev
      "
    environment:
      - NODE_ENV=development
      - PORT=8080
      - CORS_ALLOWED_ORIGINS=http://${ENDPOINT_NAME}.localhost,http://localhost:3000
      - DATABASE_URL=mysql://mysql:mysql@db:3306/app
      - OPENAI_API_KEY=sk-dummy-key-for-development
    networks:
      - internal
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "worktree.endpoint=${ENDPOINT_NAME}"
      - "worktree.project=${COMPOSE_PROJECT_NAME}"
      # Same-origin API router (high priority, intercepts /api/* requests)
      - "traefik.http.routers.${WORKTREE}-api.rule=Host(`${ENDPOINT_NAME}.localhost`) && PathPrefix(`/api`)"
      - "traefik.http.routers.${WORKTREE}-api.entrypoints=web"
      - "traefik.http.routers.${WORKTREE}-api.priority=100"
      - "traefik.http.services.${WORKTREE}-api.loadbalancer.server.port=8080"
      # StripPrefix middleware: /api/csrf-token -> /csrf-token
      - "traefik.http.middlewares.${WORKTREE}-strip-api.stripprefix.prefixes=/api"
      - "traefik.http.routers.${WORKTREE}-api.middlewares=${WORKTREE}-strip-api"
      # Backend direct access router (optional, for debugging)
      - "traefik.http.routers.${WORKTREE}-be-direct.rule=Host(`be-${ENDPOINT_NAME}.localhost`)"
      - "traefik.http.routers.${WORKTREE}-be-direct.entrypoints=web"
      - "traefik.http.routers.${WORKTREE}-be-direct.priority=1"
      # Note: CORS middleware removed - same-origin requests don't need CORS
    depends_on:
      dev:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  playwright:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile.playwright
    container_name: ${CONTAINER_NAME}-playwright
    # Increase /dev/shm size to prevent Chromium crashes in constrained environments.
    # Default 64 MB is too small for Chromium rendering; 1 GB prevents flaky test failures.
    shm_size: "1gb"
    # Keep the container alive so `docker compose exec` can trigger tests at any time
    # without waiting for a container to start.
    command: sleep infinity
    volumes:
      # Mount full workspace so tests can be run against the source tree
      - .:/workspace:cached
      # Persist pnpm store for fast installs
      - pnpm-store:/home/node/.local/share/pnpm
      # Named volumes for Playwright output artifacts (reports, traces, screenshots, videos).
      # Access from the host: docker compose cp ${CONTAINER_NAME}-playwright:/workspace/... ./local/
      - playwright-report:/workspace/projects/apps/web/playwright-report
      - playwright-test-results:/workspace/projects/apps/web/test-results
    working_dir: /workspace/projects/apps/web
    environment:
      # Resolve web service by its Compose service name on the internal network
      - PLAYWRIGHT_BASE_URL=http://web:3000
      - CI=true
      # Use system Chromium (baked into the image)
      - PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH=/usr/bin/chromium
    # Chromium uses its own async DNS resolver and bypasses Docker's embedded DNS.
    # Adding extra_hosts writes a /etc/hosts entry so Chromium can resolve "web"
    # without relying on Docker DNS (fixes ERR_NAME_NOT_RESOLVED).
    extra_hosts:
      - "web:${WEB_STATIC_IP:-172.31.0.10}"
    networks:
      - internal
    labels:
      - "worktree.endpoint=${ENDPOINT_NAME}"
      - "worktree.project=${COMPOSE_PROJECT_NAME}"
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy

volumes:
  pnpm-store:
  db-data:
  # Playwright output artifacts: HTML reports and test results (traces, screenshots, videos)
  # Access from the host via: docker compose cp <container>:/workspace/projects/apps/web/... ./
  playwright-report:
  playwright-test-results:

networks:
  internal:
    driver: bridge
    ipam:
      config:
        - subnet: ${INTERNAL_SUBNET:-172.31.0.0/24}
  traefik-public:
    external: true
