# Docker Compose for Development
# Auto-generated by stack: node-ts_pnpm
# Run: ./tools/contract dev
#
# Services:
#   web  - Next.js frontend (port 3000)
#   api  - Express backend (port 8080)
#   db   - MySQL 8 (port 3306)
#   redis - Redis 7 (port 6379)
#
# Usage:
#   docker compose up --build -d
#   curl http://localhost:3000/health  # web health
#   curl http://localhost:8080/health  # api health

services:
  # Web (Next.js) service
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    container_name: monorepo-web
    ports:
      - '3000:3000'
    volumes:
      - ./apps/web/src:/app/apps/web/src:cached
      - ./packages:/app/packages:cached
      - ../design:/design:ro
      - web_node_modules:/app/node_modules
      - web_app_node_modules:/app/apps/web/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - INTERNAL_API_URL=http://api:8080
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - app-network

  # API service
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: monorepo-api
    ports:
      - '8080:8080'
      - '9229:9229' # Node.js debug port
    volumes:
      - ./apps/api/src:/app/apps/api/src:cached
      - ./packages:/app/packages:cached
      - ./packages/api-contract/openapi.yaml:/packages/api-contract/openapi.yaml:ro
      - api_node_modules:/app/node_modules
      - api_app_node_modules:/app/apps/api/node_modules
    environment:
      - NODE_ENV=development
      - PORT=8080
      - DEBUG_PORT=9229
      - DATABASE_URL=mysql://devuser:devpass@db:3306/devdb
      - REDIS_URL=redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - app-network

  # Database service
  db:
    image: mysql:8.4
    container_name: monorepo-db
    ports:
      - '3306:3306'
    environment:
      # DEVELOPMENT ONLY - not for production use
      MYSQL_USER: devuser
      MYSQL_PASSWORD: devpass
      MYSQL_DATABASE: devdb
      MYSQL_ROOT_PASSWORD: rootpass
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'devuser', '-pdevpass']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - app-network

  # Redis service
  redis:
    image: redis:7-alpine
    container_name: monorepo-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - app-network

volumes:
  api_node_modules:
  api_app_node_modules:
  web_node_modules:
  web_app_node_modules:
  db_data:
  redis_data:

networks:
  app-network:
    driver: bridge
